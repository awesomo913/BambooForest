<!-- ============================================================
     MOBILE TOUCH CONTROLS -- injected into index.html after pygbag
     builds. Only visible on touch devices via CSS media query.
     ============================================================ -->
<style>
  #touch-controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 140px;
    pointer-events: none;
    z-index: 1000;
    display: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  @media (hover: none) and (pointer: coarse) {
    #touch-controls { display: block; }
  }
  .tc-btn {
    position: absolute;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(30, 40, 30, 0.55);
    border: 3px solid rgba(180, 220, 140, 0.85);
    color: #fff;
    font-family: sans-serif;
    font-size: 28px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
  }
  .tc-btn:active {
    background: rgba(120, 180, 80, 0.75);
    transform: scale(0.95);
  }
  /* LEFT CLUSTER (movement) -- bottom-left corner */
  #tc-left   { left: 16px;  bottom: 16px; }
  #tc-right  { left: 104px; bottom: 16px; }
  /* RIGHT CLUSTER (actions) -- bottom-right with clear vertical spacing */
  #tc-attack { right: 184px; bottom: 16px;  background: rgba(200, 80, 80, 0.55); border-color: #fc9; font-size: 18px; }
  #tc-dash   { right: 104px; bottom: 16px;  background: rgba(220, 160, 80, 0.55); border-color: #fc9; font-size: 14px; }
  #tc-jump   { right: 16px;  bottom: 16px;  background: rgba(80, 150, 220, 0.55); border-color: #8fd; }
  /* START/ENTER -- sits DIRECTLY above the ATK/DASH/JUMP row on the
     right side, spanning the width of all three action buttons so the
     thumb never has to reach. Large + green for easy tap. */
  #tc-start {
    right: 16px;
    bottom: 104px;      /* 72 (btn) + 16 (bottom margin) + 16 (gap) */
    width: 240px;       /* covers ATK (right:184) through JUMP (right:16) */
    height: 52px;
    border-radius: 26px;
    background: rgba(80, 200, 120, 0.75);
    border-color: #9fd;
    font-size: 22px;
    letter-spacing: 3px;
  }
  #tc-start:active {
    transform: scale(0.96);
    background: rgba(120, 230, 150, 0.9);
  }
  /* Taller container so START button (bottom:104) isn't clipped */
  #touch-controls { height: 180px; }
  /* START button needs vertical room beyond the 180px container */
  #tc-start { z-index: 1001; }
</style>
<div id="touch-controls" aria-hidden="true">
  <div class="tc-btn" id="tc-start"  data-key="Enter"      data-code="13">START</div>
  <div class="tc-btn" id="tc-left"   data-key="ArrowLeft"  data-code="37">&#9664;</div>
  <div class="tc-btn" id="tc-right"  data-key="ArrowRight" data-code="39">&#9654;</div>
  <div class="tc-btn" id="tc-jump"   data-key=" "          data-code="32">JUMP</div>
  <div class="tc-btn" id="tc-attack" data-key="e"          data-code="69">ATK</div>
  <div class="tc-btn" id="tc-dash"   data-key="Shift"      data-code="16">DASH</div>
</div>
<script>
  (function() {
    function keyCodeName(k) {
      if (k === " ") return "Space";
      if (k === "ArrowLeft") return "ArrowLeft";
      if (k === "ArrowRight") return "ArrowRight";
      if (k === "e") return "KeyE";
      if (k === "Shift") return "ShiftLeft";
      if (k === "Enter") return "Enter";
      return k;
    }
    function dispatchKey(type, key, code) {
      var evt = new KeyboardEvent(type, {
        key: key, code: keyCodeName(key),
        keyCode: code, which: code,
        bubbles: true, cancelable: true
      });
      document.body.dispatchEvent(evt);
      var canvas = document.querySelector("canvas");
      if (canvas) canvas.dispatchEvent(evt);
      window.dispatchEvent(evt);
    }
    document.querySelectorAll("#touch-controls .tc-btn").forEach(function(btn) {
      var key = btn.dataset.key;
      var code = parseInt(btn.dataset.code, 10);
      var press = function(e) { e.preventDefault(); dispatchKey("keydown", key, code); };
      var release = function(e) { e.preventDefault(); dispatchKey("keyup", key, code); };
      btn.addEventListener("touchstart", press, { passive: false });
      btn.addEventListener("touchend", release, { passive: false });
      btn.addEventListener("touchcancel", release, { passive: false });
      btn.addEventListener("mousedown", press);
      btn.addEventListener("mouseup", release);
      btn.addEventListener("mouseleave", release);
    });
    document.addEventListener("gesturestart", function(e) { e.preventDefault(); });
    document.addEventListener("touchmove", function(e) {
      if (e.target && e.target.closest && e.target.closest("#touch-controls")) {
        e.preventDefault();
      }
    }, { passive: false });
  })();
</script>
