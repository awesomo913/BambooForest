name: Build & Deploy Portfolio + Game to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag==0.9.3

      - name: Build WASM bundle
        working-directory: web
        run: pygbag --build main.py

      - name: Inject mobile touch-control overlay
        run: |
          python3 <<'PY'
          with open("web/build/web/index.html", "r", encoding="utf-8") as f:
              html = f.read()
          with open("web/touch_overlay.html", "r", encoding="utf-8") as f:
              overlay = f.read()
          # Inject before </body> so overlay sits above the game canvas
          if "</body>" in html:
              html = html.replace("</body>", overlay + "\n</body>", 1)
          else:
              # Fallback: just append
              html = html + "\n" + overlay
          with open("web/build/web/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print("Touch overlay injected.")
          PY

      - name: Assemble deployment artifact
        run: |
          mkdir -p deploy/game
          cp site/index.html site/styles.css deploy/
          cp favicon.png deploy/
          echo "revolutionarydesigns.io" > deploy/CNAME
          cp web/build/web/index.html \
             web/build/web/web.apk \
             web/build/web/web.tar.gz \
             web/build/web/favicon.png \
             deploy/game/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
