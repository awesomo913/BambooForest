name: Build & Deploy Portfolio + Game to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag==0.9.3

      - name: Build WASM bundle
        working-directory: web
        run: pygbag --build main.py

      - name: Inject mobile touch overlay + cache-busting
        run: |
          python3 <<'PY'
          import datetime, os
          with open("web/build/web/index.html", "r", encoding="utf-8") as f:
              html = f.read()
          with open("web/touch_overlay.html", "r", encoding="utf-8") as f:
              overlay = f.read()

          # Build stamp (UTC ISO). Visible in touch overlay + HTML comment.
          build_id = datetime.datetime.utcnow().strftime("%Y%m%d-%H%M")
          commit = os.environ.get("GITHUB_SHA", "local")[:7]

          # --- 1. Cache-busting meta tags in <head> ---
          # GitHub Pages serves Cache-Control: max-age=600 which can leave
          # stale bundles on phones for 10 minutes. Force revalidation.
          cache_meta = (
              '<meta name="viewport" content="width=device-width, initial-scale=1.0, '
              'maximum-scale=1.0, user-scalable=no, viewport-fit=cover">\n'
              '<meta name="apple-mobile-web-app-capable" content="yes">\n'
              '<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">\n'
              '<meta name="mobile-web-app-capable" content="yes">\n'
              '<meta http-equiv="Cache-Control" '
              'content="no-store, no-cache, must-revalidate, max-age=0">\n'
              '<meta http-equiv="Pragma" content="no-cache">\n'
              '<meta http-equiv="Expires" content="0">\n'
              f'<meta name="build-id" content="{build_id}-{commit}">\n'
          )
          if "<head>" in html:
              html = html.replace("<head>", "<head>\n" + cache_meta, 1)
          elif "</title>" in html:
              html = html.replace("</title>", "</title>\n" + cache_meta, 1)

          # --- 2. Build stamp chip (tiny, bottom-left of screen) ---
          stamp = (
              '<div id="tc-buildstamp" style="position:fixed;left:2px;'
              'bottom:2px;font:10px monospace;color:rgba(255,255,255,0.35);'
              'z-index:999;pointer-events:none;user-select:none;">'
              f'build {build_id} {commit}</div>'
          )

          # --- 3. Touch overlay before </body> ---
          inject = overlay + "\n" + stamp
          if "</body>" in html:
              html = html.replace("</body>", inject + "\n</body>", 1)
          else:
              html = html + "\n" + inject

          with open("web/build/web/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print(f"Injected: build {build_id} {commit}")
          PY

      - name: Assemble deployment artifact
        run: |
          mkdir -p deploy/game
          cp favicon.png deploy/
          echo "revolutionarydesigns.io" > deploy/CNAME
          # Portfolio landing page (optional -- skip silently if not yet added)
          if [ -f site/index.html ]; then
            cp site/index.html deploy/
          fi
          if [ -f site/styles.css ]; then
            cp site/styles.css deploy/
          fi
          # Always copy the game bundle into /game/
          cp web/build/web/index.html \
             web/build/web/web.apk \
             web/build/web/web.tar.gz \
             web/build/web/favicon.png \
             deploy/game/
          # If no portfolio landing page committed yet, serve the game
          # at the site root so revolutionarydesigns.io still loads it.
          if [ ! -f deploy/index.html ]; then
            cp web/build/web/index.html deploy/
            cp web/build/web/web.apk deploy/
            cp web/build/web/web.tar.gz deploy/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
